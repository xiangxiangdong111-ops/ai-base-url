<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AI Base URL Directory</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="site-header">
      <div>
        <p class="eyebrow" data-i18n="eyebrow">Verified endpoint list</p>
        <h1>AI Base URL</h1>
      </div>
      <div class="header-actions">
        <div class="language-switch" role="group" aria-label="Language switcher" data-i18n-aria-label="languageSwitcher">
          <button class="language-button is-active" type="button" data-lang="en">EN</button>
          <button class="language-button" type="button" data-lang="zh-CN">中文</button>
        </div>
        <a class="repo-link" href="https://github.com/xiangxiangdong111-ops/ai-base-url/tree/main" aria-label="Open GitHub repository" data-i18n-aria-label="openGithub">
          <svg class="repo-link-icon" aria-hidden="true" viewBox="0 0 24 24" fill="currentColor">
            <path d="M12 0.5C5.373 0.5 0 5.873 0 12.5C0 17.801 3.438 22.299 8.207 23.887C8.807 23.998 9.025 23.627 9.025 23.309C9.025 23.021 9.014 22.068 9.008 20.809C5.672 21.534 4.969 19.393 4.969 19.393C4.422 18.004 3.633 17.635 3.633 17.635C2.543 16.889 3.715 16.904 3.715 16.904C4.922 16.988 5.557 18.143 5.557 18.143C6.629 19.979 8.369 19.449 9.055 19.143C9.164 18.367 9.473 17.838 9.816 17.539C7.152 17.236 4.352 16.207 4.352 11.613C4.352 10.304 4.82 9.234 5.588 8.396C5.463 8.094 5.053 6.876 5.705 5.227C5.705 5.227 6.713 4.904 9.006 6.457C9.965 6.19 10.992 6.057 12 6.053C13.008 6.057 14.037 6.19 14.998 6.457C17.287 4.904 18.293 5.227 18.293 5.227C18.947 6.876 18.537 8.094 18.414 8.396C19.184 9.234 19.648 10.304 19.648 11.613C19.648 16.219 16.844 17.232 14.172 17.529C14.602 17.898 14.984 18.623 14.984 19.734C14.984 21.326 14.971 22.875 14.971 23.309C14.971 23.629 15.186 24.004 15.795 23.885C20.563 22.295 24 17.799 24 12.5C24 5.873 18.627 0.5 12 0.5Z"></path>
          </svg>
          <span>GitHub</span>
        </a>
      </div>
    </header>

    <main class="layout">
      <section class="registry-panel" aria-label="Base URL list" data-i18n-aria-label="baseUrlRegistry">
        <div class="panel-heading">
          <div class="filter-toolbar">
            <div class="filter-meta">
              <p class="filter-title" data-i18n="filterTitle">Refine</p>
              <p id="registry-count" class="results-count" aria-live="polite">Loading providers...</p>
            </div>
            <div class="filter-controls">
              <label class="filter-control">
                <span class="filter-caption" data-i18n="protocolFilter">Protocol filter</span>
                <select id="protocol-filter" class="filter-select" data-i18n-aria-label="protocolFilter">
                  <option value="all" data-i18n="protocolAll">All protocols</option>
                  <option value="openai-compatible">OpenAI</option>
                  <option value="anthropic-compatible">Anthropic</option>
                </select>
              </label>
              <label class="filter-control">
                <span class="filter-caption" data-i18n="providerTypeFilter">Provider type filter</span>
                <select id="provider-group-filter" class="filter-select" data-i18n-aria-label="providerTypeFilter">
                  <option value="all" data-i18n="typeTabAll">All types</option>
                  <option value="model-provider" data-i18n="groupModelProviders">Model Providers</option>
                  <option value="cloud-platform" data-i18n="groupCloudPlatforms">Cloud Platforms</option>
                </select>
              </label>
              <button id="reset-filters" class="filter-reset" type="button" data-i18n="resetFilters">Reset</button>
            </div>
          </div>
        </div>

        <label class="search-label" for="search-input" data-i18n="searchLabel">Search</label>
        <div class="search-wrapper">
          <svg class="search-icon" aria-hidden="true" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"></circle>
            <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
          </svg>
          <input id="search-input" class="search-input" type="search" placeholder="Provider, alias, domain, or base URL" data-i18n-placeholder="searchPlaceholder" autocomplete="off">
        </div>

        <div class="table-wrap" role="region" aria-label="Base URL list" data-i18n-aria-label="baseUrlRegistry" tabindex="0">
          <table>
            <thead>
              <tr>
                <th data-i18n="columnProvider">Provider</th>
                <th data-i18n="columnProtocol">Protocol</th>
                <th>Base URL</th>
                <th data-i18n="columnNotes">Endpoint Notes</th>
                <th data-i18n="columnVerified">Verified</th>
                <th data-i18n="columnSource">Source</th>
                <th data-i18n="columnCopy">Copy</th>
              </tr>
            </thead>
            <tbody id="provider-rows"></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="app.js" defer></script>
  </body>
</html>
